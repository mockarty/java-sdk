name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Build and test
        run: ./gradlew build

  publish-dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Build all JARs
        run: ./gradlew build -x test -x sign

      - name: Verify artifacts
        run: |
          echo "=== Built JARs ==="
          find . -name "*.jar" -path "*/build/libs/*" | sort
